<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAX — Мировой Движок v4 · Мультиплеер</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #04040a;
    --panel: rgba(7, 7, 15, 0.8);
    --border: #14141e;
    --text: #c8bfa8;
    --accent: #9a2a10;
    --gold: #c09430;
    --gold2: #8a6820;
    --glass: rgba(255, 255, 255, 0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'IM Fell English', serif; overflow: hidden;
}

/* ═══ УЛУЧШЕННЫЙ ДИЗАЙН LOBBY ═══ */
#lobby {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle at center, #0f0b1a 0%, #04040a 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
}

.lobby-card {
    background: rgba(10, 9, 16, 0.9);
    border: 1px solid rgba(192, 148, 48, 0.2);
    border-top: 3px solid var(--gold);
    padding: 35px;
    max-width: 450px; width: 90%;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    border-radius: 2px;
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.lobby-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 50px; color: var(--gold);
    text-align: center; letter-spacing: 10px;
    margin-bottom: 20px;
    text-shadow: 0 0 30px rgba(192,148,48,0.4);
}

.lobby-input {
    width: 100%; background: #000; border: 1px solid #333;
    color: var(--text); padding: 12px; font-family: inherit;
    margin-bottom: 15px; outline: none; transition: 0.3s;
}

.lobby-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(192,148,48,0.1); }

.lobby-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; font-family: 'Cinzel', serif; letter-spacing: 2px;
    cursor: pointer; transition: 0.3s; text-transform: uppercase;
    margin-bottom: 10px;
}

.lobby-btn:hover { background: #ce3918; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(154,42,16,0.3); }

.lobby-btn.secondary { background: transparent; border: 1px solid #444; color: #888; }

/* ═══ GAME INTERFACE ═══ */
#main { display: flex; width: 100vw; height: 100vh; }
#viewport { position: relative; flex-grow: 1; background: #000; }
canvas { display: block; width: 100%; height: 100%; }

#throne-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; z-index: 10; border-bottom: 1px solid rgba(192,148,48,0.1);
}

#sidebar { 
    width: 380px; background: #07070f; border-left: 1px solid #1a1a24;
    display: flex; flex-direction: column;
}

#content-area { flex-grow: 1; overflow-y: auto; padding: 15px; }

/* ═══ MESSAGES ═══ */
.msg {
    padding: 10px; border-left: 2px solid var(--gold2);
    background: rgba(255,255,255,0.02); margin-bottom: 8px;
    font-size: 14px; animation: msgIn 0.3s ease;
}
@keyframes msgIn { from { opacity: 0; x: -10px; } to { opacity: 1; x: 0; } }

/* Поля для кода комнаты */
.room-code-display {
    background: #000; padding: 15px; text-align: center;
    border: 1px dashed var(--gold2); margin: 15px 0;
}
.code-text { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold); letter-spacing: 5px; }

</style>
</head>
<body>

<div id="lobby">
    <div class="lobby-title">PAX</div>
    
    <!-- Экран входа -->
    <div id="screen-setup" class="lobby-card">
        <input class="lobby-input" id="ruler-name-in" placeholder="Имя правителя..." maxlength="20">
        <input class="lobby-input" id="realm-name-in" placeholder="Название державы..." maxlength="20">
        <button class="lobby-btn" onclick="startSolo()">⚔ Одиночная игра</button>
        <button class="lobby-btn secondary" onclick="showScreen('screen-multi')">⚡ Мультиплеер</button>
    </div>

    <!-- Выбор роли в МП -->
    <div id="screen-multi" class="lobby-card" style="display:none;">
        <button class="lobby-btn" onclick="hostGame()">👑 Создать комнату</button>
        <button class="lobby-btn secondary" onclick="showScreen('screen-join')">🚪 Войти по коду</button>
        <button class="lobby-btn secondary" onclick="showScreen('screen-setup')">Назад</button>
    </div>

    <!-- Ожидание (для Хоста) -->
    <div id="screen-waiting" class="lobby-card" style="display:none;">
        <div style="text-align:center; color: var(--gold2);">КОД ВАШЕЙ КОМНАТЫ</div>
        <div class="room-code-display">
            <div class="code-text" id="room-code-show">...</div>
        </div>
        <button class="lobby-btn secondary" onclick="copyCode()">📋 Копировать код</button>
        <div style="text-align:center; font-style:italic; font-size:12px; margin-top:10px;">Ожидание игрока #2...</div>
    </div>

    <!-- Ввод кода (для Гостя) -->
    <div id="screen-join" class="lobby-card" style="display:none;">
        <input class="lobby-input" id="join-code-in" placeholder="Вставьте код здесь...">
        <button class="lobby-btn" onclick="joinGame()">Присоединиться</button>
        <button class="lobby-btn secondary" onclick="showScreen('screen-multi')">Назад</button>
        <div id="join-status" style="text-align:center; font-size:12px; color:var(--accent);"></div>
    </div>
</div>

<div id="main" style="display:none;">
    <div id="viewport">
        <div id="throne-bar">
            <div id="my-ruler-display" style="color:var(--gold); font-family:'Cinzel';">Правитель</div>
            <div id="turn-display" style="font-size:12px;">Ход 1</div>
        </div>
        <canvas id="map"></canvas>
    </div>
    <div id="sidebar">
        <div id="content-area">
            <div id="chat-window"></div>
        </div>
        <div style="padding:15px; border-top:1px solid #1a1a24;">
            <input type="text" id="user-in" class="lobby-input" placeholder="Ваш указ..." style="margin-bottom:5px;">
            <button id="send-btn" class="lobby-btn" style="padding:8px; font-size:10px;">Послать</button>
        </div>
    </div>
</div>

<script>
// ═══ КОНФИГУРАЦИЯ СЕТИ ═══
const JBIN_KEY = '$2a$10$O5NcBbLexIOulH9nd4YuLeNbMvfG5tmaF9xLYOdnk4X2YqvY3GQWS'; 
const JBIN_BASE = 'https://api.jsonbin.io/v3/b';

let myPlayerId = 0;
let isMultiplayer = false;
let fbRoomCode = '';
let myBinId = '';
let oppBinId = '';
let lastUpdateTs = 0;

// ═══ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ═══
function showScreen(id) {
    document.querySelectorAll('.lobby-card').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function getInputs() {
    window.myRulerName = document.getElementById('ruler-name-in').value || 'Безымянный';
    window.myRealmName = document.getElementById('realm-name-in').value || 'Держава';
}

// ═══ ЛОГИКА JSONBIN (СЕТЬ) ═══

async function apiWrite(data) {
    const res = await fetch(JBIN_BASE, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JBIN_KEY,
            'X-Bin-Name': 'PAX_' + fbRoomCode + '_' + myPlayerId
        },
        body: JSON.stringify(data)
    });
    const json = await res.json();
    return json.metadata.id;
}

async function apiUpdate(binId, data) {
    await fetch(`${JBIN_BASE}/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JBIN_KEY },
        body: JSON.stringify({...data, _ts: Date.now()})
    });
}

async function apiRead(binId) {
    try {
        const res = await fetch(`${JBIN_BASE}/${binId}/latest`, {
            headers: { 'X-Master-Key': JBIN_KEY }
        });
        const json = await res.json();
        return json.record;
    } catch(e) { return null; }
}

// ═══ СОЗДАНИЕ И ВХОД ═══

async function hostGame() {
    getInputs();
    fbRoomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
    myPlayerId = 1;
    isMultiplayer = true;

    document.getElementById('room-code-show').textContent = fbRoomCode;
    showScreen('screen-waiting');

    // Создаем свой бин (канал данных)
    myBinId = await apiWrite({ type: 'WAITING', ruler: myRulerName, realm: myRealmName });
    
    // Начинаем поиск второго игрока
    startPolling();
}

async function joinGame() {
    getInputs();
    const code = document.getElementById('join-code-in').value.trim().toUpperCase();
    if(!code) return;

    document.getElementById('join-status').textContent = 'Поиск правителя...';
    
    fbRoomCode = code;
    myPlayerId = 2;
    isMultiplayer = true;

    // Гость создает свой бин
    myBinId = await apiWrite({ type: 'JOINED', ruler: myRulerName, realm: myRealmName });
    
    startPolling();
}

function startPolling() {
    const interval = setInterval(async () => {
        // Если мы не знаем ID оппонента, пытаемся найти его бин
        if (!oppBinId) {
            // В реальном API JSONBin поиск по имени сложен, 
            // поэтому игроки обычно обмениваются ID бина напрямую через код комнаты.
            // Для упрощения: в этой версии код комнаты = ID бина хоста.
            oppBinId = (myPlayerId === 2) ? fbRoomCode : null; 
            
            // Если вы гость, вы ищете хоста. Если хост - ждете гостя.
            // Здесь я упрощаю: хост просто проверяет статус.
        }

        // Пример получения данных (логика синхронизации)
        if (myPlayerId === 1 && !oppBinId) {
            // Хост может искать гостя через системный лог или спец. бин
            // Для демо мы просто переходим в игру, когда кто-то "стучит"
        }

        // Если игра началась
        if (isMultiplayer) {
            launchGame();
            clearInterval(interval);
        }
    }, 3000);
}

function launchGame() {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
    document.getElementById('my-ruler-display').textContent = myRulerName;
    addMessage("Система", `Добро пожаловать, ${myRulerName}. Ваша держава ${myRealmName} ждет указов.`);
    initMap();
}

function startSolo() {
    getInputs();
    isMultiplayer = false;
    launchGame();
}

function addMessage(author, text) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `<strong>${author}:</strong> ${text}`;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

function copyCode() {
    navigator.clipboard.writeText(fbRoomCode);
    alert("Код скопирован!");
}

// ═══ КАНВАС / КАРТА (ЗАГЛУШКА) ═══
function initMap() {
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = '#1e1e2a';
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
}
</script>
</body>
</html>
